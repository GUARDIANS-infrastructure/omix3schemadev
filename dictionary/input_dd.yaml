- name: participant_assessment_centre
  category: clinical
  description: >
    The assessment centre where the participant attended at baseline.
  properties:
    - name: assessment_centre_name
      description: "Name of the assessment centre"
      type: enum
      enums:
        - "Px4 Health Participant Assessment Centre"
    - name: assessment_centre_location
      description: "Location of the assessment centre"
      type: string
    - name: assessment_centre_version
      description: "Version of the assessment protocol used at the assessment centre"
      type: string
- name: anthropometry
  category: clinical
  description: >
    Physical measurements taken for the participant at baseline.
  properties:
    - name: height
      description: "Height of the participant in centimeters"
      type: number
    - name: weight
      description: "Weight of the participant in kilograms"
      type: number
    - name: bmi
      description: "Body mass index (BMI) of the participant calculated as weight (kg) / height (m)^2"
      type: number
- name: cardiovascular
  category: clinical
  description: >
    Cardiovascular measurements taken for the participant at baseline.
  properties:
    - name: systolic_bp
      description: "Systolic blood pressure of the participant in mmHg"
      type: number
    - name: diastolic_bp
      description: "Diastolic blood pressure of the participant in mmHg"
      type: number
- name: wearable
  category: clinical
  description: >
    Wearable measurements obtained from a Fitbit device taken for the participant at baseline.
  properties:
    - name: avg_heart_rate
      description: "Average heart rate of the participant in beats per minute"
      type: number
    - name: avg_step_count
      description: "Average daily step count of the participant"
      type: number
- name: medical_history
  category: clinical
  description: >
    Medical history of the participant
  properties:
    - name: diabetes_type
      description: "Diabetes diagnosed by fasting blood glucose >=7 mmol/l or tx AHA or 2 hour blood glucose >=11.1 mmol/l."
      type: enum
      enums:
        - "IGT"
        - "KDM"
        - "IFG"
        - "NDM"
        - "NGT"
    - name: hypertension
      description: "Whether the participant has Hypertension"
      type: enum
      enums:
        - "yes, measured or on treatment"
        - "yes, self-reported"
        - "no"
        - "not reported"
        - "not collected"
    - name: hypertension_measurement_type
      description: "Whether the hypertension was measured at recruitment/patients on hypertension treatment or self-reported medical diagnosis"
      type: enum
      enums:
        - "self-reported"
        - "measured"
    - name: diabetes
      description: "Self-reported diabetes in the participant"
      type: enum
      enums:
        - "yes"
        - "no"
        - "unsure"
        - "not reported"
        - "not collected"
    - name: cancer
      description: "Self-reported cancer in the participant"
      type: enum
      enums:
        - "yes"
        - "no"
        - "unsure"
        - "not reported"
        - "not collected"
    - name: diagnosed_conditions
      description: "Broad condition categories the participant has ever been diagnosed with by a doctor or health professional."
      type: enum
      enums:
        - "Autoimmune disorder"
        - "Blood disorders (Anaemia)"
        - "Cancer"
        - "Digestive system or liver problems"
        - "Endocrine, nutritional and metabolic disorders (e.g., diabetes, thyroid disorder, vitamin deficiencies)"
        - "Eye or visual problems"
        - "Fractures, breaks, or joint problems"
        - "Heart or circulatory disease (e.g., high blood pressure or stroke)"
        - "Kidney or urinary system disorders"
        - "Lung or respiratory problems"
        - "Mental health conditions (e.g.depression, bipolar disorder)"
        - "Neurodevelopmental conditions (e.g., Autism spectrum disorder, ADHD)"
        - "Neurological disorders (things that affect that brain or nervous system)"
        - "Reproductive health conditions"
        - "Other not listed"
        - "None of the above"
        - "I don't know"
        - "Prefer not to answer"
    - name: hay_fever
      description: "Whether the participant reports having hay fever or allergic rhinitis."
      type: enum
      enums:
        - "No"
        - "Yes"
        - "Do not know"
    - name: gluten_status
      description: "Whether the participant has been identified as gluten intolerant or diagnosed with coeliac disease."
      type: enum
      enums:
        - "No"
        - "Yes, gluten intolerant"
        - "Yes, coeliac"
        - "Unsure"
    - name: food_allergies
      description: "Self-reported food allergies. Multiple selections allowed."
      type: enum
      enums:
        - "I have no food allergies that I know of"
        - "Peanuts"
        - "Tree nuts"
        - "Seafood (fish or shellfish)"
        - "Dairy"
        - "Wheat"
        - "Eggs"
        - "Soy"
        - "Other"
    - name: mode_of_birth
      description: "How the participant was delivered at birth."
      type: enum
      enums:
        - "Vaginal/Natural Birth"
        - "Caesarean section"
        - "Don't know"
    - name: infant_feeding
      description: "Primary feeding method during infancy."
      type: enum
      enums:
        - "Primarily breastmilk"
        - "Primarily infant formula"
        - "A mixture of breastmilk and formula"
        - "Don't know"
- name: lifestyle
  category: clinical
  description: >
    Lifestyle and behavioural data for the participant.
  properties:
    - name: smoking_frequency
      description: "Current frequency of use of tobacco or smoking implements (cigarettes, cigars, pipes, hookah, etc.)."
      type: enum
      enums:
        - "Never"
        - "Less than once a month"
        - "Several times a month but less than once a week"
        - "Once a week"
        - "Several times a week but not daily"
        - "Daily"
    - name: vaping_frequency
      description: "Current frequency of e-cigarette or vape use."
      type: enum
      enums:
        - "Never"
        - "Seldom"
        - "Several times a month"
        - "Once a week"
        - "Several times a week"
        - "Every day"
    - name: alcohol_frequency
      description: "How often the participant consumes a drink containing alcohol (AUDIT question 1)."
      type: enum
      enums:
        - "Never"
        - "Monthly or Less"
        - "2 to 4 times a month"
        - "2 to 3 times a week"
        - "4 or more times a week"
        - "Prefer not to answer"
    - name: time_outdoors
      description: "Usual time spent outside per day in activities such as gardening, parks, hiking, cycling, swimming."
      type: enum
      enums:
        - "Less than one hour per week (10 minutes or less a day)"
        - "1-3 hours per week (10-30 minutes each day)"
        - "3-6 hours per week (31-60 minutes each day)"
        - "7-14 hours per week (1-2 hours each day)"
        - "14-28 hours per week (2-4 hours each day)"
        - "More than 28 hours per week (4 or more hours each day)"
    - name: screen_time_hours
      description: "Daily hours spent in front of a screen for leisure activities (TV, computer, tablet, mobile), excluding work. Slider 0-20."
      type: number
    - name: shift_work
      description: "Frequency of shift work in current or most recent employment."
      type: enum
      enums:
        - "Never/rarely"
        - "Sometimes"
        - "Usually"
        - "Always"
    - name: greenspace_proximity
      description: "Walking time from home to the nearest green or natural space."
      type: enum
      enums:
        - "Fewer than 5 minutes"
        - "5-9 minutes"
        - "10-19 minutes"
        - "20-30 minutes"
        - "More than 30 minutes"
        - "No green space/too far to walk"
    - name: social_contact_frequency
      description: "How often the participant visits friends or family or has them visit."
      type: enum
      enums:
        - "Daily or almost daily"
        - "2-4 times a week"
        - "About once a week"
        - "About once a month"
        - "Once every few months"
        - "Never or almost never"
        - "No friends or family outside household"
    - name: diet_type
      description: "General classification of the participant's usual dietary pattern."
      type: enum
      enums:
        - "I eat anything with no or few exclusions (omnivore)"
        - "I eat anything except red meat"
        - "I eat some meat, but mostly have a vegetable diet (flexitarian)"
        - "Vegetarian"
        - "Vegetarian but eat seafood (pescatarian)"
        - "Vegan"
        - "Other"
        - "Prefer not to say"
    - name: diet_healthiness
      description: "Self-assessed healthiness of diet based on participant's own understanding of healthy eating."
      type: enum
      enums:
        - "Almost always healthy"
        - "Healthy more often than unhealthy"
        - "Healthy about half the time"
        - "Unhealthy more often than healthy"
        - "Almost always unhealthy"
        - "Prefer not to answer"
- name: wellbeing
  category: clinical
  description: >
    Wellbeing and quality of life data for the participant.
  properties:
    - name: quality_of_life
      description: "Self-rated overall quality of life (WHOQOL-BREF question 1)."
      type: enum
      enums:
        - "Very poor"
        - "Poor"
        - "Neither poor nor good"
        - "Good"
        - "Very good"
    - name: sleep_satisfaction
      description: "Satisfaction with sleep quality (SATED sleep health questionnaire)."
      type: enum
      enums:
        - "Rarely/Never"
        - "Sometimes"
        - "Usually/Always"
    - name: social_isolation
      description: "How often the participant feels isolated from others (Three-Item Loneliness Scale)."
      type: enum
      enums:
        - "Hardly ever or never"
        - "Some of the time"
        - "Often"
        - "Prefer not to answer"
##### Biospecimen nodes
- name: sample
  category: biospecimen
  description: >
    Biospecimen information that links subjects to samples including
    sample's provider and source.
  properties:
    - name: sample_id
      description: "A unique identifier of a sample obtained from a subject"
      type: string
    - name: sample_orig_provider
      description: "The name of original institute that provided the sample"
      type: enum
      enums:
        - "Baker"
        - "USYD"
        - "UMELB"
        - "UQ"
    - name: sample_source
      description: "Uberon identifier, anatomical location as described by the Uber Anatomy Ontology (UBERON)."
      type: string
    - name: sample_type
      description: The type of sample collected
      type: enum
      enums:
        - PBMC
        - Plasma
        - Saliva
        - Faeces
        - Urine
        - Plaque
    - name: date_collected
      description: "The date of sample collection (YYYY-MM-DD)"
      type: string


##### Experimental Methods nodes
- name: genomics_assay
