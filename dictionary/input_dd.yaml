version: 0.1.2
url: https://data.acdc.ozheart.org

####################################
# Nodes
####################################
nodes:

##### Administrative nodes
- name: acknowledgement
  category: administrative
  description: >
    Acknowledgement of an individual or group involved in a project.

- name: publication
  category: administrative
  description: >
    Publication for a project


##### Clinical nodes
- name: subject
  category: clinical
  description: >
    An individual participant in the study with baseline measurements.
  properties:
    - name: consent_codes
      description: "Data Use Restrictions that are used to indicate permissions/restrictions for datasets and/or materials."
      type: array
    - name: baseline_year
      description: "Year when baseline measurements were taken"
      type: string
    - name: cohort_id
      description: "Identifier for the cohort the subject is a part of"
      type: string

- name: demographic
  category: clinical
  description: >
    Data for the characterization of the patient by means of segmenting
    the population (e.g. characterization by age, sex, or race).
  properties:
    - name: year_birth
      description: "Year of birth at baseline (YYYY)"
      type: integer
    - name: month_birth
      description: "Month of birth at baseline (MM)"
      type: integer
    - name: sex
      description: "Sex assigned at birth"
      type: enum
      enums:
        - "Male"
        - "Female"
        - "Unknown"
    - name: country_birth
      description: "Country of birth"
      type: string
    - name: education_highest_level
      description: "The highest level of education attained by the participant"
      type: enum
      enums:
        - Postgraduate degree Masters/PhD
        - Honours Bachelor degree/Graduate diploma/Graduate certificate
        - Bachelor degree but not Honours
        - TAFE diploma/TAFE advanced diploma/TAFE graduate diploma
        - TAFE certificate 3 or 4
        - TAFE certificate 1 or 2
        - Year 12 or equivalent
        - Year 11 or equivalent
        - Year 9, 10, or equivalent
        - Year 7, 8, or equivalent
        - Finished primary school
        - Did not finish primary school
        - No schooling
        - Other
    - name: age
      description: "Participant's current age in years, calculated from date of birth."
      type: number
    - name: sex_at_birth
      description: "Biological sex recorded at birth."
      type: enum
      enums:
        - "assigned_female"
        - "assigned_male"
        - "assigned_intersex"
    - name: country_of_birth
      description: "Country in which the participant was born. ISO 3166-1 alpha-2 codes."
      type: string
    - name: mother_country_of_birth
      description: "Country in which the participant's biological mother was born."
      type: string
    - name: father_country_of_birth
      description: "Country in which the participant's biological father was born."
      type: string
    - name: ancestry
      description: "Self-reported ancestry (up to two selections)."
      type: enum
      enums:
        - "english"
        - "irish"
        - "scottish"
        - "chinese"
        - "italian"
        - "german"
        - "aboriginal"
        - "torres_strait_islander"
        - "australian"
        - "other_1"
        - "other_2"
    - name: education_level
      description: "Highest level of formal education completed."
      type: enum
      enums:
        - "postgraduate"
        - "honours_grad_dip"
        - "bachelor"
        - "tafe_diploma"
        - "tafe_cert_3_4"
        - "tafe_cert_1_2"
        - "year_12"
        - "year_11"
        - "year_9_10"
        - "year_7_8"
        - "finished_primary"
        - "did_not_finish_primary"
        - "no_schooling"
        - "other"
    - name: relationship_status
      description: "Current relationship or marital status."
      type: enum
      enums:
        - "single"
        - "married_de_facto"
        - "divorced_separated"
        - "widowed"
        - "partner_not_cohabiting"
        - "other"
    - name: residence_type
      description: "Classification of the participant's current place of residence."
      type: enum
      enums:
        - "rural_semi_rural"
        - "regional_city_town"
        - "suburban"
        - "urban_fringe"
        - "cbd"
    - name: income_adequacy
      description: "Self-assessed ability to manage on available income."
      type: enum
      enums:
        - "easily"
        - "not_too_bad"
        - "difficult_sometimes"
        - "difficult_always"
        - "impossible"
    - name: employment_status
      description: "Current employment or occupational situation. Multiple selections allowed."
      type: enum
      enums:
        - "employed_self_employed"
        - "retired"
        - "home_family"
        - "unable_to_work"
        - "unemployed"
        - "voluntary_work"
        - "student"
        - "none_of_above"
    - name: household_size
      description: "Total number of people living in the participant's household, including the participant."
      type: integer
    - name: pet_in_home
      description: "Whether the participant has a pet living in their home."
      type: boolean

- name: participant_assessment_centre
  category: clinical
  description: >
    The assessment centre where the participant attended at baseline.
  properties:
    - name: assessment_centre_name
      description: "Name of the assessment centre"
      type: enum
      enums:
        - "Px4 Health Participant Assessment Centre"
    - name: assessment_centre_location
      description: "Location of the assessment centre"
      type: string
    - name: assessment_centre_version
      description: "Version of the assessment protocol used at the assessment centre"
      type: string
- name: anthropometry
  category: clinical
  description: >
    Physical measurements taken for the participant at baseline.
  properties:
    - name: height
      description: "Height of the participant in centimeters"
      type: number
    - name: weight
      description: "Weight of the participant in kilograms"
      type: number
    - name: bmi
      description: "Body mass index (BMI) of the participant calculated as weight (kg) / height (m)^2"
      type: number
- name: cardiovascular
  category: clinical
  description: >
    Cardiovascular measurements taken for the participant at baseline.
  properties:
    - name: systolic_bp
      description: "Systolic blood pressure of the participant in mmHg"
      type: number
    - name: diastolic_bp
      description: "Diastolic blood pressure of the participant in mmHg"
      type: number
- name: wearable
  category: clinical
  description: >
    Wearable measurements obtained from a Fitbit device taken for the participant at baseline.
  properties:
    - name: avg_heart_rate
      description: "Average heart rate of the participant in beats per minute"
      type: number
    - name: avg_step_count
      description: "Average daily step count of the participant"
      type: number
- name: medical_history
  category: clinical
  description: >
    Medical history of the participant
  properties:
    - name: diabetes_type
      description: "Diabetes diagnosed by fasting blood glucose >=7 mmol/l or tx AHA or 2 hour blood glucose >=11.1 mmol/l."
      type: enum
      enums:
        - "IGT"
        - "KDM"
        - "IFG"
        - "NDM"
        - "NGT"
    - name: hypertension
      description: "Whether the participant has Hypertension"
      type: enum
      enums:
        - "yes, measured or on treatment"
        - "yes, self-reported"
        - "no"
        - "not reported"
        - "not collected"
    - name: hypertension_measurement_type
      description: "Whether the hypertension was measured at recruitment/patients on hypertension treatment or self-reported medical diagnosis"
      type: enum
      enums:
        - "self-reported"
        - "measured"
    - name: diabetes
      description: "Self-reported diabetes in the participant"
      type: enum
      enums:
        - "yes"
        - "no"
        - "unsure"
        - "not reported"
        - "not collected"
    - name: cancer
      description: "Self-reported cancer in the participant"
      type: enum
      enums:
        - "yes"
        - "no"
        - "unsure"
        - "not reported"
        - "not collected"
    - name: diagnosed_conditions
      description: "Broad condition categories the participant has ever been diagnosed with by a doctor or health professional."
      type: enum
      enums:
        - "autoimmune"
        - "anaemia"
        - "cancer"
        - "gi_liver"
        - "endocrine_metabolic"
        - "eye_visual"
        - "fractures_bone_joint"
        - "heart_cardiovascular"
        - "kidney_urinary"
        - "lung_respiratory"
        - "mental_health"
        - "neurodevelopmental"
        - "neurological"
        - "reproductive"
        - "other"
        - "none"
        - "unknown"
        - "prefer_not_to_answer"
    - name: hay_fever
      description: "Whether the participant reports having hay fever or allergic rhinitis."
      type: enum
      enums:
        - "no"
        - "yes"
        - "do_not_know"
    - name: gluten_status
      description: "Whether the participant has been identified as gluten intolerant or diagnosed with coeliac disease."
      type: enum
      enums:
        - "no"
        - "gluten_intolerant"
        - "coeliac"
        - "unsure"
    - name: food_allergies
      description: "Self-reported food allergies. Multiple selections allowed."
      type: enum
      enums:
        - "none"
        - "peanuts"
        - "tree_nuts"
        - "seafood"
        - "dairy"
        - "wheat"
        - "eggs"
        - "soy"
        - "other"
    - name: mode_of_birth
      description: "How the participant was delivered at birth."
      type: enum
      enums:
        - "vaginal"
        - "caesarean"
        - "unknown"
    - name: infant_feeding
      description: "Primary feeding method during infancy."
      type: enum
      enums:
        - "breastmilk"
        - "formula"
        - "mixture"
        - "unknown"

- name: lifestyle
  category: clinical
  description: >
    Lifestyle and behavioural data for the participant.
  properties:
    - name: smoking_frequency
      description: "Current frequency of use of tobacco or smoking implements (cigarettes, cigars, pipes, hookah, etc.)."
      type: enum
      enums:
        - "never"
        - "less_than_monthly"
        - "several_times_monthly"
        - "weekly"
        - "several_times_weekly"
        - "daily"
    - name: vaping_frequency
      description: "Current frequency of e-cigarette or vape use."
      type: enum
      enums:
        - "never"
        - "seldom"
        - "several_times_monthly"
        - "weekly"
        - "several_times_weekly"
        - "daily"
    - name: alcohol_frequency
      description: "How often the participant consumes a drink containing alcohol (AUDIT question 1)."
      type: enum
      enums:
        - "never"
        - "monthly_or_less"
        - "two_to_four_monthly"
        - "two_to_three_weekly"
        - "four_plus_weekly"
        - "prefer_not_to_answer"
    - name: time_outdoors
      description: "Usual time spent outside per day in activities such as gardening, parks, hiking, cycling, swimming."
      type: enum
      enums:
        - "lt_1hr_week"
        - "1_to_3hrs_week"
        - "3_to_6hrs_week"
        - "1_to_2hrs_day"
        - "2_to_4hrs_day"
        - "gt_4hrs_day"
    - name: screen_time_hours
      description: "Daily hours spent in front of a screen for leisure activities (TV, computer, tablet, mobile), excluding work."
      type: number
    - name: shift_work
      description: "Frequency of shift work in current or most recent employment."
      type: enum
      enums:
        - "never_rarely"
        - "sometimes"
        - "usually"
        - "always"
    - name: greenspace_proximity
      description: "Walking time from home to the nearest green or natural space."
      type: enum
      enums:
        - "lt_5min"
        - "5_to_9min"
        - "10_to_19min"
        - "20_to_30min"
        - "gt_30min"
        - "no_green_space"
    - name: social_contact_frequency
      description: "How often the participant visits friends or family, or has them visit."
      type: enum
      enums:
        - "daily"
        - "2_to_4_weekly"
        - "weekly"
        - "monthly"
        - "every_few_months"
        - "never"
        - "no_friends_family_outside_household"
    - name: diet_type
      description: "General classification of the participant's usual dietary pattern."
      type: enum
      enums:
        - "omnivore"
        - "no_red_meat"
        - "flexitarian"
        - "vegetarian"
        - "pescatarian"
        - "vegan"
        - "other"
        - "prefer_not_to_say"
    - name: diet_healthiness
      description: "Self-assessed healthiness of diet based on the participant's own understanding of healthy eating."
      type: enum
      enums:
        - "almost_always_healthy"
        - "more_healthy"
        - "half_the_time"
        - "more_unhealthy"
        - "almost_always_unhealthy"
        - "prefer_not_to_answer"

- name: wellbeing
  category: clinical
  description: >
    Wellbeing and quality of life data for the participant.
  properties:
    - name: quality_of_life
      description: "Self-rated overall quality of life (WHOQOL-BREF question 1)."
      type: enum
      enums:
        - "very_poor"
        - "poor"
        - "neither"
        - "good"
        - "very_good"
    - name: sleep_satisfaction
      description: "Satisfaction with sleep quality (SATED sleep health questionnaire)."
      type: enum
      enums:
        - "rarely_never"
        - "sometimes"
        - "usually_always"
    - name: social_isolation
      description: "How often the participant feels isolated from others (Three-Item Loneliness Scale)."
      type: enum
      enums:
        - "hardly_ever"
        - "some_of_the_time"
        - "often"
        - "prefer_not_to_answer"

##### Biospecimen nodes
- name: sample
  category: biospecimen
  description: >
    Biospecimen information that links subjects to samples including
    sample's provider and source.
  properties:
    - name: sample_id
      description: "A unique identifier of a sample obtained from a subject"
      type: string
    - name: sample_orig_provider
      description: "The name of original institute that provided the sample"
      type: enum
      enums:
        - "Baker"
        - "USYD"
        - "UMELB"
        - "UQ"
    - name: sample_source
      description: "Uberon identifier, anatomical location as described by the Uber Anatomy Ontology (UBERON)."
      type: string
    - name: sample_type
      description: The type of sample collected
      type: enum
      enums:
        - PBMC
        - Plasma
        - Saliva
        - Faeces
        - Urine
        - Plaque
    - name: date_collected
      description: "The date of sample collection (YYYY-MM-DD)"
      type: string


##### Experimental Methods nodes
- name: genomics_assay
  category: experimental_methods
