version: 0.1.2
url: https://data.acdc.ozheart.org

####################################
# Nodes
####################################
nodes:

##### Administrative nodes
- name: acknowledgement
  category: administrative
  description: >
    Acknowledgement of an individual or group involved in a project.

- name: publication
  category: administrative
  description: >
    Publication for a project


##### Clinical nodes
- name: subject
  category: clinical
  description: >
    An individual participant in the study with baseline measurements.
  properties:
    - name: consent_codes
      description: "Data Use Restrictions that are used to indicate permissions/restrictions for datasets and/or materials."
      type: array
    - name: baseline_year
      description: "Year when baseline measurements were taken"
      type: string
    - name: cohort_id
      description: "Identifier for the cohort the subject is a part of"
      type: string

- name: demographic
  category: clinical
  description: >
    Data for the characterization of the patient by means of segmenting
    the population (e.g. characterization by age, sex, or race).
  properties:
    - name: year_birth
      description: "Year of birth at baseline (YYYY)"
      type: integer
    - name: month_birth
      description: "Month of birth at baseline (MM)"
      type: integer
    - name: sex
      description: "Sex assigned at birth"
      type: enum
      enums:
        - "Male"
        - "Female"
        - "Unknown"
    - name: country_birth
      description: "Country of birth"
      type: string
    - name: education_highest_level
      description: "The highest level of education attained by the participant"
      type: enum
      enums:
        - Postgraduate degree Masters/PhD
        - Honours Bachelor degree/Graduate diploma/Graduate certificate
        - Bachelor degree but not Honours
        - TAFE diploma/TAFE advanced diploma/TAFE graduate diploma
        - TAFE certificate 3 or 4
        - TAFE certificate 1 or 2
        - Year 12 or equivalent
        - Year 11 or equivalent
        - Year 9, 10, or equivalent
        - Year 7, 8, or equivalent
        - Finished primary school
        - Did not finish primary school
        - No schooling
        - Other
    - name: age
      description: "Participant's current age in years, calculated from date of birth."
      type: number
    - name: sex_at_birth
      description: "Biological sex recorded at birth."
      type: enum
      enums:
        - "Assigned female"
        - "Assigned male"
        - "Assigned intersex"
    - name: country_of_birth
