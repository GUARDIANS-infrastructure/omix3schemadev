$schema: http://json-schema.org/draft-04/schema#
id: participant_assessment_centre
title: participant_assessment_centre
type: object
namespace: https://data.acdc.ozheart.org/
category: clinical
program: '*'
project: '*'
description: 'The assessment centre where the participant attended at baseline.

  '
submittable: true
validators: null
systemProperties:
- id
- project_id
- state
- created_datetime
- updated_datetime
uniqueKeys:
- - id
- - project_id
  - submitter_id
required:
- submitter_id
- type
links:
- name: subjects
  backref: participant_assessment_centres
  label: part_of
  target_type: subject
  multiplicity: one_to_one
  required: true
properties:
  $ref: _definitions.yaml#/ubiquitous_properties
  assessment_centre_name:
    description: Name of the assessment centre
    enum:
    - Px4 Health Participant Assessment Centre
  assessment_centre_location:
    type: string
    description: Location of the assessment centre
  assessment_centre_version:
    type: string
    description: Version of the assessment protocol used at the assessment centre
  subjects:
    $ref: _definitions.yaml#/to_one
additionalProperties: false
