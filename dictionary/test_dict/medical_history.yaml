$schema: http://json-schema.org/draft-04/schema#
id: medical_history
title: medical_history
type: object
namespace: https://data.acdc.ozheart.org/
category: clinical
program: '*'
project: '*'
description: 'Medical history of the participant

  '
submittable: true
validators: null
systemProperties:
- id
- project_id
- state
- created_datetime
- updated_datetime
uniqueKeys:
- - id
- - project_id
  - submitter_id
required:
- submitter_id
- type
links:
- exclusive: false
  required: true
  subgroup:
  - name: participant_assessment_centres
    backref: medical_historys
    label: part_of
    target_type: participant_assessment_centre
    multiplicity: one_to_one
    required: true
  - name: participant_assessment_centres
    backref: medical_historys
    label: part_of
    target_type: participant_assessment_centre
    multiplicity: one_to_one
    required: true
properties:
  $ref: _definitions.yaml#/ubiquitous_properties
  diabetes_type:
    description: Diabetes diagnosed by fasting blood glucose >=7 mmol/l or tx AHA
      or 2 hour blood glucose >=11.1 mmol/l.
    enum:
    - IGT
    - KDM
    - IFG
    - NDM
    - NGT
  hypertension:
    description: Whether the participant has Hypertension
    enum:
    - yes, measured or on treatment
    - yes, self-reported
    - 'no'
    - not reported
    - not collected
  hypertension_measurement_type:
    description: Whether the hypertension was measured at recruitment/patients on
      hypertension treatment or self-reported medical diagnosis
    enum:
    - self-reported
    - measured
  diabetes:
    description: Self-reported diabetes in the participant
    enum:
    - 'yes'
    - 'no'
    - unsure
    - not reported
    - not collected
  cancer:
    description: Self-reported cancer in the participant
    enum:
    - 'yes'
    - 'no'
    - unsure
    - not reported
    - not collected
  diagnosed_conditions:
    description: Broad condition categories the participant has ever been diagnosed
      with by a doctor or health professional.
    enum:
    - autoimmune
    - anaemia
    - cancer
    - gi_liver
    - endocrine_metabolic
    - eye_visual
    - fractures_bone_joint
    - heart_cardiovascular
    - kidney_urinary
    - lung_respiratory
    - mental_health
    - neurodevelopmental
    - neurological
    - reproductive
    - other
    - none
    - unknown
    - prefer_not_to_answer
  hay_fever:
    description: Whether the participant reports having hay fever or allergic rhinitis.
    enum:
    - 'no'
    - 'yes'
    - do_not_know
  gluten_status:
    description: Whether the participant has been identified as gluten intolerant
      or diagnosed with coeliac disease.
    enum:
    - 'no'
    - gluten_intolerant
    - coeliac
    - unsure
  food_allergies:
    description: Self-reported food allergies. Multiple selections allowed.
    enum:
    - none
    - peanuts
    - tree_nuts
    - seafood
    - dairy
    - wheat
    - eggs
    - soy
    - other
  mode_of_birth:
    description: How the participant was delivered at birth.
    enum:
    - vaginal
    - caesarean
    - unknown
  infant_feeding:
    description: Primary feeding method during infancy.
    enum:
    - breastmilk
    - formula
    - mixture
    - unknown
  participant_assessment_centres:
    $ref: _definitions.yaml#/to_one
additionalProperties: false
