$schema: http://json-schema.org/draft-04/schema#
id: medical_history
title: medical_history
type: object
namespace: https://data.acdc.ozheart.org/
category: clinical
program: '*'
project: '*'
description: 'Medical history of the participant

  '
submittable: true
validators: null
systemProperties:
- id
- project_id
- state
- created_datetime
- updated_datetime
uniqueKeys:
- - id
- - project_id
  - submitter_id
required:
- submitter_id
- type
links:
- exclusive: false
  required: true
  subgroup:
  - name: participant_assessment_centres
    backref: medical_historys
    label: part_of
    target_type: participant_assessment_centre
    multiplicity: one_to_one
    required: true
  - name: participant_assessment_centres
    backref: medical_historys
    label: part_of
    target_type: participant_assessment_centre
    multiplicity: one_to_one
    required: true
properties:
  $ref: _definitions.yaml#/ubiquitous_properties
  diabetes_type:
    description: Diabetes diagnosed by fasting blood glucose >=7 mmol/l or tx AHA
      or 2 hour blood glucose >=11.1 mmol/l.
    enum:
    - IGT
    - KDM
    - IFG
    - NDM
    - NGT
  hypertension:
    description: Whether the participant has Hypertension
    enum:
    - yes, measured or on treatment
    - yes, self-reported
    - 'no'
    - not reported
    - not collected
  hypertension_measurement_type:
    description: Whether the hypertension was measured at recruitment/patients on
      hypertension treatment or self-reported medical diagnosis
    enum:
    - self-reported
    - measured
  diabetes:
    description: Self-reported diabetes in the participant
    enum:
    - 'yes'
    - 'no'
    - unsure
    - not reported
    - not collected
  cancer:
    description: Self-reported cancer in the participant
    enum:
    - 'yes'
    - 'no'
    - unsure
    - not reported
    - not collected
  diagnosed_conditions:
    description: Broad condition categories the participant has ever been diagnosed
      with by a doctor or health professional.
    enum:
    - Autoimmune disorder
    - Blood disorders (Anaemia)
    - Cancer
    - Digestive system or liver problems
    - Endocrine, nutritional and metabolic disorders (e.g., diabetes, thyroid disorder,
      vitamin deficiencies)
    - Eye or visual problems
    - Fractures, breaks, or joint problems
    - Heart or circulatory disease (e.g., high blood pressure or stroke)
    - Kidney or urinary system disorders
    - Lung or respiratory problems
    - Mental health conditions (e.g.depression, bipolar disorder)
    - Neurodevelopmental conditions (e.g., Autism spectrum disorder, ADHD)
    - Neurological disorders (things that affect that brain or nervous system)
    - Reproductive health conditions
    - Other not listed
    - None of the above
    - I don't know
    - Prefer not to answer
  hay_fever:
    description: Whether the participant reports having hay fever or allergic rhinitis.
    enum:
    - 'No'
    - 'Yes'
    - Do not know
  gluten_status:
    description: Whether the participant has been identified as gluten intolerant
      or diagnosed with coeliac disease.
    enum:
    - 'No'
    - Yes, gluten intolerant
    - Yes, coeliac
    - Unsure
  food_allergies:
    description: Self-reported food allergies. Multiple selections allowed.
    enum:
    - I have no food allergies that I know of
    - Peanuts
    - Tree nuts
    - Seafood (fish or shellfish)
    - Dairy
    - Wheat
    - Eggs
    - Soy
    - Other
  mode_of_birth:
    description: How the participant was delivered at birth.
    enum:
    - Vaginal/Natural Birth
    - Caesarean section
    - Don't know
  infant_feeding:
    description: Primary feeding method during infancy.
    enum:
    - Primarily breastmilk
    - Primarily infant formula
    - A mixture of breastmilk and formula
    - Don't know
  participant_assessment_centres:
    $ref: _definitions.yaml#/to_one
additionalProperties: false
