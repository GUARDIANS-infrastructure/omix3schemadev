  ancestry:
    description: Self-reported ancestry (up to two selections).
    enum:
    - English
    - Irish
    - Scottish
    - Chinese
    - Italian
    - German
    - Aboriginal
    - Torres Strait Islander
    - Australian
    - Other 1
    - Other 2
  education_level:
    description: Highest level of formal education completed.
    enum:
    - Postgraduate degree
    - Honours Bachelor degree/Graduate diploma/Graduate certificate
    - Bachelor degree but not Honours
    - TAFE diploma/TAFE advanced diploma/TAFE graduate diploma
    - TAFE certificate 3 or 4
    - TAFE certificate 1 or 2
    - Year 12 or equivalent
    - Year 11 or equivalent
    - Year 9, 10, or equivalent
    - Year 7, 8, or equivalent
    - Finished primary school
    - Did not finish primary school
    - No schooling
    - Other
  relationship_status:
    description: Current relationship or marital status.
    enum:
    - Single
    - Married, or living with a partner (de facto)
    - Divorced or separated
    - Widow/widower
    - Have a partner but not living together
    - Other
  residence_type:
    description: Classification of current place of residence by urbanisation level.
    enum:
    - Rural or semi-rural
    - Regional city or town
    - Suburban
    - Urban fringe
    - Central business district
  income_adequacy:
    description: Self-assessed ability to manage on available income.
    enum:
    - Easily
    - Not too bad
    - Difficult some of the time
    - Difficult all of the time
    - Impossible
  employment_status:
    description: Current employment or occupational situation. Multiple selections
      allowed.
    enum:
    - In paid employment or self-employed
    - Retired
    - Looking after home and/or family
    - Unable to work because of illness or disability
    - Unemployed
    - Doing unpaid or voluntary work
    - Full or part-time student
    - None of the above
  household_size:
    type: integer
    description: Total number of people living in the household including the participant.
  pet_in_home:
    description: Whether the participant has a pet living in their home.
    enum:
    - 'No'
    - 'Yes'
