$schema: http://json-schema.org/draft-04/schema#
id: lifestyle
title: lifestyle
type: object
namespace: https://data.acdc.ozheart.org/
category: clinical
program: '*'
project: '*'
description: 'Lifestyle and behavioural data for the participant.

  '
submittable: true
validators: null
systemProperties:
- id
- project_id
- state
- created_datetime
- updated_datetime
uniqueKeys:
- - id
- - project_id
  - submitter_id
required:
- submitter_id
- type
links:
- name: participant_assessment_centres
  backref: lifestyles
  label: part_of
  target_type: participant_assessment_centre
  multiplicity: one_to_one
  required: true
properties:
  $ref: _definitions.yaml#/ubiquitous_properties
  smoking_frequency:
    description: Current frequency of use of tobacco or smoking implements (cigarettes,
      cigars, pipes, hookah, etc.).
    enum:
    - Never
    - Less than once a month
    - Several times a month but less than once a week
    - Once a week
    - Several times a week but not daily
    - Daily
  vaping_frequency:
    description: Current frequency of e-cigarette or vape use.
    enum:
    - Never
    - Seldom
    - Several times a month
    - Once a week
    - Several times a week
    - Every day
  alcohol_frequency:
    description: How often the participant consumes a drink containing alcohol (AUDIT
      question 1).
    enum:
    - Never
    - Monthly or Less
    - 2 to 4 times a month
    - 2 to 3 times a week
    - 4 or more times a week
    - Prefer not to answer
  time_outdoors:
    description: Usual time spent outside per day in activities such as gardening,
      parks, hiking, cycling, swimming.
    enum:
    - Less than one hour per week (10 minutes or less a day)
    - 1-3 hours per week (10-30 minutes each day)
    - 3-6 hours per week (31-60 minutes each day)
    - 7-14 hours per week (1-2 hours each day)
    - 14-28 hours per week (2-4 hours each day)
    - More than 28 hours per week (4 or more hours each day)
  screen_time_hours:
    type: number
    description: Daily hours spent in front of a screen for leisure activities (TV,
      computer, tablet, mobile), excluding work. Slider 0-20.
  shift_work:
    description: Frequency of shift work in current or most recent employment.
    enum:
    - Never/rarely
    - Sometimes
    - Usually
    - Always
  greenspace_proximity:
    description: Walking time from home to the nearest green or natural space.
    enum:
    - Fewer than 5 minutes
    - 5-9 minutes
    - 10-19 minutes
    - 20-30 minutes
    - More than 30 minutes
    - No green space/too far to walk
  social_contact_frequency:
    description: How often the participant visits friends or family or has them visit.
    enum:
    - Daily or almost daily
    - 2-4 times a week
    - About once a week
    - About once a month
    - Once every few months
    - Never or almost never
    - No friends or family outside household
  diet_type:
    description: General classification of the participant's usual dietary pattern.
    enum:
    - I eat anything with no or few exclusions (omnivore)
    - I eat anything except red meat
    - I eat some meat, but mostly have a vegetable diet (flexitarian)
    - Vegetarian
    - Vegetarian but eat seafood (pescatarian)
    - Vegan
    - Other
    - Prefer not to say
  diet_healthiness:
    description: Self-assessed healthiness of diet based on participant's own understanding
      of healthy eating.
    enum:
    - Almost always healthy
    - Healthy more often than unhealthy
    - Healthy about half the time
    - Unhealthy more often than healthy
    - Almost always unhealthy
    - Prefer not to answer
  participant_assessment_centres:
    $ref: _definitions.yaml#/to_one
additionalProperties: false
